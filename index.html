<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FishOS</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Helvetica, Arial, sans-serif;
  height: 100vh;
  overflow: hidden;
}

.background {
  position: fixed;
  inset: 0;
  background-image: url("https://upload.wikimedia.org/wikipedia/en/2/27/Bliss_%28Windows_XP%29.png");
  background-size: cover;
  background-position: center;
}

.content {
  position: relative;
  width: 100%;
  height: 100%;
}

#desktopApps {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.desktop-icon {
  width: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  user-select: none;
}

.desktop-icon-image {
  width: 48px;
  height: 48px;
  object-fit: contain;
}

.desktop-icon-label {
  color: white;
  text-align: center;
  font-size: 12px;
  text-shadow: 1px 1px 3px black;
}

.window {
  position: absolute;
  display: none;
  flex-direction: column;
  width: 400px;
  height: 300px;
  border-radius: 8px;
  overflow: hidden;
  background: rgba(20,20,20,.75);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.2);
  box-shadow: 0 8px 20px rgba(0,0,0,.5);
}

.windowheader {
  height: 40px;
  padding: 0 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: white;
  cursor: move;
  background: rgba(0,0,0,.3);
}

.windowcontent {
  flex: 1;
  overflow: auto;
  color: white;
  padding: 10px;
}

.windowclose {
  width: 28px;
  height: 28px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  background: #e53935;
  color: white;
  font-size: 18px;
}

.windowclose:hover {
  opacity: .9;
}

.taskbar {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  height: 50px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  background: rgba(0,0,0,.3);
  backdrop-filter: blur(10px);
  color: white;
  z-index: 9999;
}

.taskbar-label {
  margin-right: auto;
}

.time {
  font-size: 14px;
}

.fish-card {
  margin-bottom: 20px;
}

.fish-card img {
  width: 100%;
  border-radius: 6px;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="background"></div>

<div class="content">

  <div id="desktopApps">

    <div class="desktop-icon" id="welcomeIcon">
      <img
        class="desktop-icon-image"
        src="https://cdn-icons-png.flaticon.com/512/716/716784.png"
        alt="Folder"
      >
      <span class="desktop-icon-label">
        welcome.txt
      </span>
    </div>

    <div class="desktop-icon" id="fishfinderIcon">
      <img
        class="desktop-icon-image"
        src="https://cdn-icons-png.flaticon.com/512/716/716784.png"
        alt="Folder"
      >
      <span class="desktop-icon-label">
        fishfinder.exe
      </span>
    </div>

  </div>

  <div
    id="welcome"
    class="window"
    style="top:60px;left:120px;"
  >
    <div class="windowheader">
      <span>welcome.txt</span>
      <button
        id="welcomeclose"
        class="windowclose"
      >
        ×
      </button>
    </div>

    <div class="windowcontent">
      <h2>Welcome to FishOS</h2>
      <p>Your aquatic desktop environment.</p>
    </div>
  </div>

  <div
    id="fishfinder"
    class="window"
    style="top:120px;left:220px;width:500px;height:400px;"
  >
    <div class="windowheader">
      <span>Fishfinder</span>
      <button
        id="fishfinderclose"
        class="windowclose"
      >
        ×
      </button>
    </div>

    <div
      id="fishfinderContent"
      class="windowcontent"
    >
    </div>
  </div>

</div>

<div class="taskbar">
  <span class="taskbar-label">FishOS</span>
  <span id="timeElement" class="time"></span>
</div>

<script src="script.js"></script>

</body>
</html>
