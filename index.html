<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FishOS</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Helvetica, Arial, sans-serif;
  height: 100vh;
  overflow: hidden;
}

.background {
  position: fixed;
  inset: 0;
  background-image: url("https://aquaforest.eu/wp-content/uploads/2025/06/blazenek-scaled.jpg");
  background-size: cover;
  background-position: center;
}

.content {
  position: relative;
  width: 100%;
  height: 100%;
}

#desktopApps {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.desktop-icon {
  width: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  user-select: none;
}

.desktop-icon-image {
  width: 48px;
  height: 48px;
  object-fit: contain;
}

.desktop-icon-label {
  color: white;
  text-align: center;
  font-size: 12px;
  text-shadow: 1px 1px 3px black;
}

.window {
  position: absolute;
  display: none;
  flex-direction: column;
  width: 400px;
  height: 300px;
  overflow: hidden;

  background: white;
  border: 1px solid #808080;
  border-radius: 4px;

  box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.35);
}

.windowheader {
  height: 32px;

  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 0 10px;

  background: #d9d9d9;
  border-bottom: 1px solid #a0a0a0;

  color: black;
  font-weight: bold;

  cursor: move;
  user-select: none;
}

.windowcontent {
  flex: 1;

  background: white;
  color: black;

  overflow: auto;
  padding: 12px;
}

.windowclose {
  width: 22px;
  height: 22px;

  border: 1px solid #888;
  border-radius: 2px;

  background: #f0f0f0;
  color: black;

  cursor: pointer;
  font-size: 14px;
}

.windowclose:hover {
  background: #e0e0e0;
}

.windowclose:hover {
  opacity: .9;
}

.taskbar {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  height: 50px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  background: rgba(0,0,0,.3);
  backdrop-filter: blur(10px);
  color: white;
  z-index: 9999;
}

.taskbar-label {
  margin-right: auto;
}

.time {
  font-size: 14px;
}

.fish-card {
  margin-bottom: 20px;
}

.fish-card img {
  width: 100%;
  border-radius: 6px;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="background"></div>

<div class="content">

  <div id="desktopApps">

    <div class="desktop-icon" id="welcomeIcon">
      <img
        class="desktop-icon-image"
        src="https://cdn-icons-png.flaticon.com/512/716/716784.png"
        alt="Folder"
      >
      <span class="desktop-icon-label">
        welcome.txt
      </span>
    </div>

    <div class="desktop-icon" id="fishfinderIcon">
      <img
        class="desktop-icon-image"
        src="https://cdn-icons-png.flaticon.com/512/716/716784.png"
        alt="Folder"
      >
      <span class="desktop-icon-label">
        fishfinder.exe
      </span>
    </div>
    <div class="desktop-icon" id="notepadIcon">
  <img
    class="desktop-icon-image"
    src="https://cdn-icons-png.flaticon.com/512/716/716784.png"
    alt="Folder"
  >
  <span class="desktop-icon-label">
    FishPad.exe
  </span>
</div>

  </div>

  <div
    id="welcome"
    class="window"
    style="top:60px;left:120px;"
  >
    <div class="windowheader">
      <span>welcome.txt</span>
      <button
        id="welcomeclose"
        class="windowclose"
      >
        ×
      </button>
    </div>

    <div class="windowcontent">
      <h2>Welcome to FishOS</h2>
      <p>Your aquatic desktop environment.</p>
    </div>
  </div>

  <div
    id="fishfinder"
    class="window"
    style="top:120px;left:220px;width:500px;height:400px;"
  >
    <div class="windowheader">
      <span>Fishfinder</span>
      <button
        id="fishfinderclose"
        class="windowclose"
      >
        ×
      </button>
    </div>

<div
  id="fishfinderContent"
  class="windowcontent"
>
</div>
</div>

<div
  id="notepad"
  class="window"
  style="top:180px;left:280px;width:600px;height:450px;"
>
  <div class="windowheader">
    <span>FishPad</span>

    <button
      id="notepadclose"
      class="windowclose"
    >
      ×
    </button>
  </div>

  <div class="windowcontent">

    <button id="saveNoteButton">
      Save Note
    </button>

    <br><br>

    <textarea
      id="notepadText"
      style="
        width:100%;
        height:320px;
        resize:none;
        padding:10px;
        font-family:monospace;
      "
    ></textarea>

  </div>
</div>
  </div>

</div>

<div class="taskbar">
  <span class="taskbar-label">FishOS</span>
  <span id="timeElement" class="time"></span>
</div>

<script src="script.js"></script>

</body>
</html>
